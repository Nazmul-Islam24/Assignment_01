<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working a Assignment</title>
    <link href="https://fonts.googleapis.com/css2?
    family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
     <link rel="stylesheet" href="style.css">
     <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
  <header class="header">
    <nav>
      <ul class="navber">
       <li><h1>LOGO</h1></li>
       <li><button class="btn">Sign Up</button></li>
      </ul>
    </nav>
    <div class="banner">
        <h1>Cool Dark UI Template for<br> Webflow Agencies!</h1>
        <button class="btn">Stay Focused</button>
    </div>
  </header>
  <main>
    <!--1st-container-->
    <section class="container_first">
        <div class="first">
          <h4>See It in Action</h4>
          <p>Explore the live preview and imagine your brand in this bold new look.</p>
          <button class="btn">Launch Live Preview</button>
        </div>
        <div>
          <img class="first_image" src="images/wc-mini.png" alt="wc-mini-images">
        </div>
    </section>
    
  <!--2nd-container-->
    <section class="container_second">
      <div class="second">
        <h2>Joined Thousands of Productive Users</h2>
        <ul class="product_use_rate">
          <div class="li">
            <li class="digit">50K</li>
            <p>Active Users</p>
          </div>
          <div class="li">
            <li class="digit">2M+</li>
            <p>Focus Sessions</p>
          </div>
          <div class="li">
              <li class="digit">95%</li>
              <p>Satisfaction Rate</p>
          </div>
        </ul>
      </div>
    </section>
  </main>
